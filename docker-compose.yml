services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dch_spor
      POSTGRES_USER: dch_spor
      POSTGRES_PASSWORD: dch_spor
    ports:
      - "5432:5432"
    volumes:
      - dch-postgres:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: "postgresql://dch_spor:dch_spor@postgres:5432/dch_spor?schema=public"
      NEXT_PUBLIC_APP_NAME: "DcH Sporplanlægger"
      DCH_ACCESS_TOKEN: "${DCH_ACCESS_TOKEN:-}"
      DCH_DEV_USER_EMAIL: "${DCH_DEV_USER_EMAIL:-dev@dch.local}"
      DCH_DEV_USER_NAME: "${DCH_DEV_USER_NAME:-Lokal DcH-bruger}"
    command: sh -c "npm run db:generate:postgres && npm run db:push:postgres && npm run db:seed && npm run dev"
    volumes:
      - dch-data:/app/prisma
      - dch-uploads:/app/.data

volumes:
  dch-data:
  dch-postgres:
  dch-uploads:
